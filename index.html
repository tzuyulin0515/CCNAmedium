// 2. 應用程式邏輯區
// ==========================================
let currentQuestions = [];
let currentIndex = 0;
let userAnswers = {};
let currentShuffledOptions = [];

const appContainer = document.getElementById('app');

// 打亂陣列工具
function shuffle(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

// 啟動測驗
function startQuiz(unit) {
    if (unit === 'all') {
        currentQuestions = shuffle(quizData);
    } else {
        currentQuestions = shuffle(quizData.filter(q => q.unit === unit));
    }
    currentIndex = 0;
    userAnswers = {};
    renderQuiz();
}

// 選擇選項 (單選與多選)
function toggleOption(optId, type) {
    let qId = currentQuestions[currentIndex].id;
    if (!userAnswers[qId]) userAnswers[qId] = [];
    
    if (type === 'single') {
        userAnswers[qId] = [optId];
    } else {
        let idx = userAnswers[qId].indexOf(optId);
        if (idx > -1) userAnswers[qId].splice(idx, 1);
        else userAnswers[qId].push(optId);
    }
    renderQuiz(); // 重新渲染更新 UI
}

// 處理配對題選項變更
window.updateMatch = function(optId, bucketId) {
    let qId = currentQuestions[currentIndex].id;
    if (!userAnswers[qId]) userAnswers[qId] = {};
    
    if (bucketId === "") {
        delete userAnswers[qId][optId]; // 如果選回空白，就刪除該紀錄
    } else {
        userAnswers[qId][optId] = bucketId; // 紀錄選項對應的籃子
    }
    renderQuiz();
}

// 下一題
function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        renderQuiz();
    } else {
        renderResults();
    }
}

// 判斷對錯 (升級版：支援單/多選與配對題)
function isCorrect(qId, correctData) {
    let q = currentQuestions.find(item => item.id === qId);
    let uAns = userAnswers[qId];

    if (q.type === 'match') {
        if (!uAns) return false;
        let correctKeys = Object.keys(correctData);
        let userKeys = Object.keys(uAns);
        
        // 檢查是否有選錯的 (包含選了不該選的陷阱題)
        for (let key of userKeys) {
            if (uAns[key] !== correctData[key]) return false;
        }
        // 檢查是否所有該配對的都有配對到
        for (let key of correctKeys) {
            if (uAns[key] !== correctData[key]) return false;
        }
        return true;
    } else {
        // 原本選擇題的邏輯
        if (!uAns) uAns = [];
        if (uAns.length !== correctData.length) return false;
        return correctData.every(ans => uAns.includes(ans));
    }
}

// 渲染考卷
function renderQuiz() {
    let q = currentQuestions[currentIndex];
    let selected = userAnswers[q.id];
    
    // 每次進入新題目，打亂選項
    if ((!selected || Object.keys(selected).length === 0) && !q._shuffled) {
        q._shuffledOptions = shuffle(q.options);
        q._shuffled = true;
    }
    
    // 檢查是否有作答
    let isAnswered = false;
    if (q.type === 'match') {
        isAnswered = selected && Object.keys(selected).length > 0; // 配對題只要有配對任一項即可亮按鈕
    } else {
        isAnswered = selected && selected.length > 0;
    }
    
    let html = `
        <div class="header" style="display: flex; justify-content: space-between; font-size: 16px;">
            <span>${q.unit === 'chapter1' ? 'Chapter 1' : 'Chapter 2'}</span>
            <span>題目 ${currentIndex + 1} / ${currentQuestions.length}</span>
        </div>
        <div class="content">
            <div>
                ${q.type === 'multiple' ? '<span class="tag tag-multi">複選題 (多選)</span>' : (q.type === 'match' ? '<span class="tag tag-match">配對題 (下拉選單)</span>' : '<span class="tag tag-single">單選題</span>')}
                ${q.hasImage ? '<span class="tag tag-img">🖼️ 需搭配圖示</span>' : ''}
            </div>
            <h2 style="margin-top: 10px;">${q.questionEn}</h2>
            <p style="color: #4b5563; border-left: 4px solid #d1d5db; padding-left: 10px;">${q.questionZh}</p>
            
            ${q.hasImage && q.imageUrl ? `<div style="text-align:center;"><img class="question-img" src="${q.imageUrl}" alt="附圖" onerror="this.style.display='none'"></div>` : ''}
            
            <div style="margin-top: 20px;">
                ${q.type === 'match' ? 
                    // 渲染配對題 (下拉選單)
                    q._shuffledOptions.map(opt => {
                        let currentSelection = (userAnswers[q.id] && userAnswers[q.id][opt.id]) || '';
                        return `
                        <div style="display: flex; flex-direction: column; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; background: white;">
                            <span style="font-weight: 500; margin-bottom: 8px;">${opt.text}</span>
                            <select onchange="updateMatch('${opt.id}', this.value)" style="padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; background: #f8fafc; font-size: 14px;">
                                <option value="">-- 選擇對應階層 --</option>
                                ${q.buckets.map(b => `<option value="${b.id}" ${currentSelection === b.id ? 'selected' : ''}>${b.text}</option>`).join('')}
                            </select>
                        </div>`;
                    }).join('') 
                    : 
                    // 渲染原本的選擇題
                    q._shuffledOptions.map(opt => `
                    <label class="option-label ${selected && selected.includes(opt.id) ? 'selected' : ''}" onclick="event.preventDefault(); toggleOption('${opt.id}', '${q.type}')">
                        <input type="${q.type === 'multiple' ? 'checkbox' : 'radio'}" ${selected && selected.includes(opt.id) ? 'checked' : ''}>
                        <span>${opt.text}</span>
                    </label>
                    `).join('')
                }
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn" style="margin: 0; flex: 1; background-color: #fee2e2; color: #b91c1c; border-color: #fca5a5;" onclick="renderResults()">
                    提早交卷
                </button>
                <button class="${isAnswered ? 'btn btn-primary' : 'btn btn-disabled'}" 
                        style="margin: 0; flex: 2;"
                        ${isAnswered ? '' : 'disabled'} 
                        onclick="nextQuestion()">
                    ${currentIndex === currentQuestions.length - 1 ? '完成測驗' : '下一題'}
                </button>
            </div>
        </div>
    `;
    appContainer.innerHTML = html;
}

// 渲染結果與錯題本
function renderResults() {
    let correctCount = 0;
    let wrongHTML = '';
    
    currentQuestions.forEach(q => {
        if (isCorrect(q.id, q.correctAnswers)) {
            correctCount++;
        } else {
            let uAns = userAnswers[q.id] || (q.type === 'match' ? {} : []);
            let userTexts = '';
            let correctTexts = '';

            // 判斷錯題本的渲染方式 (配對題 vs 選擇題)
            if (q.type === 'match') {
                // 正確答案渲染
                correctTexts = Object.keys(q.correctAnswers).map(optId => {
                    let optText = q.options.find(o => o.id === optId).text;
                    let bucketText = q.buckets.find(b => b.id === q.correctAnswers[optId]).text;
                    return `${optText} ➔ <b>${bucketText}</b>`;
                }).join('<br>• ');

                // 你的答案渲染
                if (Object.keys(uAns).length === 0) {
                    userTexts = '<i style="color:#f87171">未作答</i>';
                } else {
                    userTexts = Object.keys(uAns).map(optId => {
                        let optText = q.options.find(o => o.id === optId).text;
                        let bucketText = q.buckets.find(b => b.id === uAns[optId]).text;
                        let isRight = q.correctAnswers[optId] === uAns[optId];
                        return `${optText} ➔ <b style="color:${isRight ? '#166534' : '#991b1b'}">${bucketText} ${isRight ? '✅' : '❌'}</b>`;
                    }).join('<br>• ');
                }
            } else {
                correctTexts = q.correctAnswers.map(id => q.options.find(o=>o.id===id).text).join('<br>• ');
                userTexts = uAns.length === 0 ? '<i style="color:#f87171">未作答</i>' : uAns.map(id => q.options.find(o=>o.id===id).text).join('<br>• ');
            }
            
            wrongHTML += `
                <div class="wrong-item">
                    <span class="tag ${q.type === 'multiple' ? 'tag-multi' : (q.type === 'match' ? 'tag-match' : 'tag-single')}">${q.type === 'multiple' ? '多選' : (q.type === 'match' ? '配對' : '單選')}</span>
                    <h4 style="margin-top: 10px;">${q.questionEn}</h4>
                    <p style="font-size: 14px; color: #6b7280; margin-bottom: 10px;">${q.questionZh}</p>
                    ${q.hasImage && q.imageUrl ? `<div style="text-align:center;"><img class="question-img" src="${q.imageUrl}" style="max-height: 150px;"></div>` : ''}
                    
                    <div class="ans-box" style="${q.type === 'match' ? 'flex-direction: column;' : ''}">
                        <div class="your-ans"><strong>❌ 你的答案：</strong><br>• ${userTexts}</div>
                        <div class="correct-ans"><strong>✅ 正確答案：</strong><br>• ${correctTexts}</div>
                    </div>
                </div>
            `;
        }
    });

    let scorePercentage = Math.round((correctCount / currentQuestions.length) * 100);
    
    appContainer.innerHTML = `
        <div class="header">測驗結果</div>
        <div class="content">
            <div class="result-box">
                <div class="score-circle">${scorePercentage}%</div>
                <h2>答對：${correctCount} / ${currentQuestions.length} 題</h2>
                <button class="btn" style="width: auto; padding: 10px 30px; display: inline-block; margin-top: 10px;" onclick="renderHome()">返回首頁重測</button>
            </div>
            
            ${wrongHTML ? `
                <h3 style="color: #dc2626; margin-top: 30px;">🚨 錯題檢討區 (共錯 ${currentQuestions.length - correctCount} 題)</h3>
                ${wrongHTML}
            ` : `
                <h3 style="color: #16a34a; text-align: center; margin-top: 30px;">🎉 太神啦！全對！期中考穩了！</h3>
            `}
        </div>
    `;
}

// 啟動程式
renderHome();
</script>

</body>
</html>
